# Research Bundle — Paper-Only Variant

The focused paper-authoring surface of the research bundle. Use this when you
want to write and format a paper without the full research-discipline pipeline.
For the complete rigor workflow (hypothesis → pre-registration → experiment →
honest-pivot → venue-ready output), use the root `bundle.md` instead.
