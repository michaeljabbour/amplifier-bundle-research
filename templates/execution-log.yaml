# --------------------------------------------------------------------------
# Analysis steps  -  ordered, exactly as run
# --------------------------------------------------------------------------
# One entry per discrete step. If a step deviates from the preregistered
# analysis plan, set deviation_from_plan: true and give a note; the
# deviations section below gets a cross-linked entry as well.
analysis_steps:
  - step_id: 01-load
    description: Load paired dataset, confirm n and pairing key.
    tools_invoked: [python]
    input_files:  [/work/data/reflection-tokens.csv]
    output_files: [/work/artifacts/loaded.parquet]
    exit_status: 0
    duration_seconds: 3.1
    deviation_from_plan: false
    deviation_note: null
  - step_id: 02-mcnemar-gsm8k
    description: Primary confirmatory test (P1): paired McNemar on GSM8K.
    tools_invoked: [python, scipy.stats.mcnemar]
    input_files:  [/work/artifacts/loaded.parquet]
    output_files: [/work/artifacts/mcnemar_gsm8k.json, /work/figures/fig1_gsm8k.pdf]
    exit_status: 0
    duration_seconds: 0.4
    deviation_from_plan: false
    deviation_note: null
  - step_id: 03-mcnemar-aime
    description: Primary confirmatory test (P2): paired McNemar on AIME.
    tools_invoked: [python, scipy.stats.mcnemar]
    input_files:  [/work/artifacts/loaded.parquet]
    output_files: [/work/artifacts/mcnemar_aime.json]
    exit_status: 0
    duration_seconds: 0.4
    deviation_from_plan: true
    deviation_note: |
      Observed effect (+2.1pp, p=0.073) below preregistered MDE of +2pp
      at alpha=0.05. See deviations[0]. No change to test choice;
      deviation is in interpretation, not method.

# --------------------------------------------------------------------------
# Deviations  -  every honest-pivot firing, with resolution
# --------------------------------------------------------------------------
# resolution is one of:
#   exploratory -  finding retained in paper, tagged [EXPLORATORY]
#   amended     -  preregistration amended (timestamped) to accommodate
#   disabled    -  finding dropped from the paper entirely
deviations:
  - id: DEV-01
    fired_at: 2026-04-18T10:31:12-07:00
    related_step_id: 03-mcnemar-aime
    related_prediction_id: P2
    description: |
      AIME McNemar failed the one-sided alpha=0.05 threshold (p=0.073).
      Preregistration predicted +2pp with power 0.8; observed +2.1pp
      but power was lower than estimated because within-pair
      disagreement rate was lower than assumed.
    resolution: exploratory
    resolution_note: |
      Finding retained as exploratory evidence of a smaller-than-predicted
      effect on harder problems. /draft will tag it [EXPLORATORY]. No
      post-hoc change to test or alpha.

