# ==========================================================================
# PRE-REGISTRATION TEMPLATE
# ==========================================================================
# Written by /plan. Hash-locked with SHA256 on exit from /plan.
# Any change after hash-lock requires a timestamped amendment (not a rewrite)
# and fires the honest-pivot behavior.
#
# This template is used by all empirical recipes (empirical-paper,
# replication-study) and by any other recipe where defensibility requires
# lock-before-data. Patent-brief and policy-brief use adapted versions
# (templates/patent-prereg.yaml, templates/policy-prereg.yaml).
# ==========================================================================

metadata:
  created_at: <ISO-8601 timestamp>
  created_by: <user identifier>
  recipe: <recipe name>
  bundle_version: 0.1.0
  session_id: <amplifier session id>

# --------------------------------------------------------------------------
# The sharpened question, carried forward from /question
# --------------------------------------------------------------------------
question:
  one_line: <the question in a single sentence>
  scope:
    applies_to: <domain / population / conditions>
    does_not_apply_to: <explicit out-of-scope>

# --------------------------------------------------------------------------
# Confirmatory predictions — what we commit to in advance
# --------------------------------------------------------------------------
predictions:
  - id: P1
    statement: <specific, measurable prediction>
    mechanism: <why we expect this>
    directional: <true | false>   # one-sided vs. two-sided test
    measurable_via:
      outcome_variable: <what we measure>
      unit_of_analysis: <paired items | subjects | sessions | etc.>
      summary_statistic: <mean | median | rate | etc.>
    threshold_of_interest:
      minimum_detectable_effect: <MDE>
      effect_size_units: <pp | std devs | raw units>

# --------------------------------------------------------------------------
# Analysis plan — locked before data are seen
# --------------------------------------------------------------------------
analysis_plan:
  primary_test:
    test: <e.g., paired McNemar | paired t-test | bootstrap CI>
    alpha: 0.05
    correction: benjamini-hochberg   # for multiple predictions
    power:
      target: 0.8
      n_required: <from power analysis>
  secondary_analyses:
    - <any pre-registered secondary analyses>
  exploratory_zone:
    - <sub-analyses explicitly labeled exploratory in advance>
    # Anything in the exploratory zone gets the exploratory tag
    # throughout the pipeline. Anything outside it that comes up
    # later also gets the exploratory tag (via the behavior).

# --------------------------------------------------------------------------
# Disconfirmation — what would falsify
# --------------------------------------------------------------------------
disconfirmation:
  - <observation that would refute P1>
  - <observation that would refute P2>

# --------------------------------------------------------------------------
# Methodology detail
# --------------------------------------------------------------------------
methodology:
  data_source:
    description: <what data, from where>
    access: <public | internal | third-party with access agreement>
    version_or_hash: <SHA256 of the dataset if available>
  sample:
    inclusion_criteria: [<criterion 1>, <criterion 2>]
    exclusion_criteria: [<criterion 1>, <criterion 2>]
    sample_size_justification: <power analysis | resource constraint | etc.>
  procedure:
    seed: 42
    deterministic: true
    reproducibility_checks: [<check 1>, <check 2>]
  potential_biases:
    - bias: <e.g., selection bias>
      mitigation: <how we handle it>
      residual_risk: <what we can't fully mitigate>

# --------------------------------------------------------------------------
# Honest-pivot clause — the explicit commitment
# --------------------------------------------------------------------------
honest_pivot_clause: |
  If the results do not support the predictions above, we will:
  1. Report the null or contrary finding clearly, in the Results section.
  2. Not rewrite predictions post-hoc to match observed findings.
  3. If a legitimate methodological correction is needed, amend this
     document with a timestamped note rather than editing in place.
  4. Label any finding not predicted here as exploratory in the final
     write-up.

# --------------------------------------------------------------------------
# Amendment log — timestamped additions only, never deletions
# --------------------------------------------------------------------------
amendments: []   # appended to via /plan --amend, never edited in place

# --------------------------------------------------------------------------
# Autonomous experiment loop — FROZEN APPARATUS (hash-locked, never in-loop)
# --------------------------------------------------------------------------
# Present ONLY when this study runs the autonomous-experiment-loop.
# If absent, /execute behaves exactly as today (single-pass).
# See context/autonomous-loop-awareness.md and
# skills/conducting-autonomous-experiments/SKILL.md for full protocol.
#
# Discipline: intervention_surface and measurement_protocol MUST be disjoint.
# The loop may edit the surface, never the measurement protocol.
# Changing any field requires a NEW pre-registration (new hash).
experiment_loop:
  intervention_surface:   # files/globs the loop MAY mutate (e.g. src/train.py)
    - <path or glob, e.g. src/train.py>

  measurement_protocol:   # FROZEN eval (e.g. prepare.py + eval)
    run_command: <executable command emitting the metric lines>
    primary_metric_parse: <how the primary scalar is parsed from stdout>
    judge_panel:           # required only when metric is LLM-judged
      enabled: false
      models:              # cross-vendor >=2 families, never single-model
        - <provider/model, e.g. anthropic/claude-opus-4-8>
        - <provider/model, e.g. openai/gpt-5.5>
      meta_reviewer: <provider/model that reconciles the ensemble>
      kappa_threshold: 0.6  # inter-judge Cohen's kappa floor; below -> SUSPICIOUS

  primary_metric:
    name: <metric name, e.g. val_bpb>
    direction: <minimize | maximize>
    keep_revert_rule: |
      keep iff the primary improves beyond noise (e.g. > 2x across-seed sd)
      AND no guardrail regresses past its tolerance, else revert

  guardrail_metrics:
    - name: <metric name, e.g. peak_vram_mb>
      tolerance: <e.g. "<= 40000">

  stopping_rule:
    max_iterations: <int; 1 = degenerate single-iteration loop>
    patience: <int; stop after N iterations with no kept improvement>
    budget: <per-run wall-clock / token budget>

  seeds: [0, 1, 2]   # search seeds, n>1 fixes autoresearch's n=1

  held_out_confirmation:   # reserved for the promotion gate; loop never touches
    seeds: [100, 101, 102]
    set: <held-out data/config the search never sees>

# --------------------------------------------------------------------------
# Self-witnessing hash — populated by /plan on exit
# --------------------------------------------------------------------------
sha256: <computed at hash-lock time, before /execute begins>
