# ==========================================================================
# EVIDENCE-GATHER LOG  -  what actually happened during /execute for
#                        non-empirical recipes
# ==========================================================================
# Written by research-coordinator during /execute for recipes whose
# "execution" is systematic evidence gathering, not analysis of data:
#     patent-brief      (prior-art search)
#     policy-brief      (systematic evidence + stakeholder mapping)
#     literature-review (systematic search + inclusion screening)
#
# For empirical recipes, use templates/execution-log.yaml instead.
#
# This file accompanies the relevant pre-registration
# (patent-prereg.yaml / policy-prereg.yaml / preregistration.yaml) in
# the session artifact bundle. Reviewers use it to verify that the
# search plan committed at /plan was actually executed at /execute.
#
# At /execute exit, the sha256 of this file is concatenated with the
# pre-registration sha256 and re-hashed; that combined hash is the
# baseline honest-pivot checks against during /critique and /draft.
#
# All timestamps are ISO-8601 with timezone. All hashes are hex sha256
# (lowercase, no prefix). Example values below show a filled-in log for
# a patent prior-art search; replace them with real values.
# ==========================================================================

