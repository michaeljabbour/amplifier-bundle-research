# --------------------------------------------------------------------------
# Sources retrieved  -  every source actually opened and reviewed
# --------------------------------------------------------------------------
# relevance_tag is one of:
#   primary       - directly anticipates a claim; blocks novelty
#   supporting    - provides context; does not anticipate
#   disconfirming - contradicts the novelty story (MUST be surfaced, not hidden)
#   excluded      - retrieved then excluded on inclusion criteria
sources_retrieved:
  - citation_id: PA-001
    found_via_query: Q01
    identifier: US10,847,234
    url_or_doi: https://patents.google.com/patent/US10847234
    retrieved_at: 2026-04-19T08:22:44-07:00
    relevance_tag: supporting
    inclusion_decision:
      included: true
      rationale: |
        Dynamic resource allocation for distributed systems; no feedback
        loop or agent context. Useful as Category B (allocation without
        feedback) for the claim chart.
  - citation_id: PA-002
    found_via_query: Q01
    identifier: US11,234,567
    url_or_doi: https://patents.google.com/patent/US11234567
    retrieved_at: 2026-04-19T08:31:09-07:00
    relevance_tag: supporting
    inclusion_decision:
      included: true
      rationale: |
        Agent-based resource management with static budget per task
        type, not runtime feedback. Different teaching.
  - citation_id: PA-014
    found_via_query: Q03
    identifier: 10.1109/ICDCS.2023.00421
    url_or_doi: https://doi.org/10.1109/ICDCS.2023.00421
    retrieved_at: 2026-04-19T11:02:55-07:00
    relevance_tag: disconfirming
    inclusion_decision:
      included: true
      rationale: |
        IMPORTANT: describes an online feedback loop for allocating
        compute to agents based on per-step reward signal. Overlap is
        substantial; may anticipate independent claim 1. Flagged to
        /critique for novelty stress-test. Not hiding this.
  - citation_id: PA-019
    found_via_query: Q04
    identifier: arXiv:2310.04242
    url_or_doi: https://arxiv.org/abs/2310.04242
    retrieved_at: 2026-04-19T11:38:17-07:00
    relevance_tag: excluded
    inclusion_decision:
      included: false
      rationale: |
        Published after the priority date assumed for this application;
