# --------------------------------------------------------------------------
# Gaps and limitations  -  documented search gaps, surfaced to the reader
# --------------------------------------------------------------------------
# Every item here becomes a bullet in the final brief's "Limitations"
# section. Do not delete entries to make the search look more complete.
gaps_and_limitations:
  - id: G01
    gap: |
      Foreign-language patent filings (CN, JP, KR) were not searched.
      Machine translation of Chinese patents in this space has known
      gaps for agent-system terminology.
    impact: |
      Risk of unidentified prior art in CN/JP/KR filings. Recommend
      engaging a foreign-associate search before international filing.
    mitigation: deferred_to_expert_review
  - id: G02
    gap: |
      GitHub and other non-patent, non-paper sources (blog posts,
      technical reports) were not systematically searched.
    impact: |
      35 USC 102(a)(1) "otherwise available to the public" art could
      exist as prior blog posts or open-source projects.
    mitigation: spot_checked_top_3_github_repos_in_space

