# ==========================================================================
# EXPERIMENT LEDGER TEMPLATE
# ==========================================================================
#
# Disciplined, append-only descendant of autoresearch's results.tsv
# (Andrej Karpathy, MIT).
#
# WHEN IT IS WRITTEN / WHO OWNS IT
#   Written and owned by recipes/autonomous-experiment-loop.yaml during
#   /execute.  Located in the study's working directory, e.g.
#   experiments/<study>/ledger.yaml.
#
# APPEND-ONLY INVARIANT
#   One YAML list item per loop iteration, appended by
#   scripts/experiment-loop/ledger_append.sh — never edited in place.
#   Git-tracked but OUTSIDE the intervention_surface.
#   Committed in its OWN commit AFTER each keep/revert decision so that
#   a reverted intervention never deletes ledger rows.
#
# SCHEMA
#   This file ships the schema definition (as comments below) plus one
#   worked example for each record type:
#     - iteration row     — written by ledger_append.sh after each run
#     - confirmation row  — APPENDED by the promotion gate; never rewrites
#                           the iteration row above it
# ==========================================================================

# --------------------------------------------------------------------------
# FIELD SCHEMA  (one YAML list item = one loop iteration)
# --------------------------------------------------------------------------
# iteration          int          loop counter (1-based)
# prereg_hash        str          "sha256:<hex>" of the frozen apparatus
#                                 pre-registration; binds this row to the
#                                 locked experiment design
# commit             str          short git SHA of the kept/reverted
#                                 intervention commit
# intervention       str          human-readable description of the change
# rationale          str          why this intervention was selected
# prediction         str          pre-stated directional hypothesis
# seeds              list[int]    random seeds used in this run
# primary_metric
#   name             str          metric identifier
#   values           list[float]  per-seed measurements
#   mean             float        mean across seeds
#   sd               float        standard deviation across seeds
# guardrail_metrics  list
#   name             str          guardrail metric identifier
#   mean             float        mean across seeds
#   tolerance        str          acceptance threshold expression
#   regressed        bool         true if tolerance was violated
# judge_agreement    mapping|null present only when metric is LLM-judged;
#                                 null or omitted otherwise
#   kappa            float|null   Cohen's kappa across judge panel;
#                                 null when not yet computed
#   kappa_threshold  float        below this value -> audit verdict SUSPICIOUS
# decision           keep|revert  outcome of the keep/revert gate
# decision_reason    str          brief justification
# label              exploratory|confirmatory
# audit_verdict      PASS|FAIL|SUSPICIOUS|ERROR  from tool-experiment-audit
# artifacts          list[str]    files produced by this run
# timestamp          str          ISO-8601 UTC timestamp

# --------------------------------------------------------------------------
# Example iteration row (one list item, appended per loop by ledger_append.sh)
# --------------------------------------------------------------------------
- iteration: 7
  prereg_hash: "sha256:abc123"
  commit: "a1b2c3d"
  intervention: "increase MLP width 512->768"
  rationale: "capacity-bound; predict primary improves"
  prediction: "primary down >= 0.5%"
  seeds: [0, 1, 2]
  primary_metric:
    name: val_bpb
    values: [0.812, 0.809, 0.814]
    mean: 0.8117
    sd: 0.0025
  guardrail_metrics:
    - name: peak_vram_mb
      mean: 38120
      tolerance: "<= 40000"
      regressed: false
  judge_agreement:
    kappa: null
    kappa_threshold: 0.6
  decision: keep
  decision_reason: "primary improved beyond 2x sd; no guardrail regression"
  label: exploratory
  audit_verdict: PASS
  artifacts: ["run.log", "loss_curve.png"]
  timestamp: "2026-05-29T07:30:00Z"

# --------------------------------------------------------------------------
# Example confirmation record (APPENDED by the promotion gate — a separate
# list item; the promotion gate never rewrites the iteration row above it)
# --------------------------------------------------------------------------
- confirmation:
    confirms_iteration: 7
    label: confirmatory
    held_out_seeds: [100, 101, 102]
    corrected_significance:
      test: paired
      alpha: 0.05
      correction: benjamini-hochberg
      passed: true
    judge_panel_verdict:
      per_judge:
        - model: "claude-opus-4-8"
          verdict: promote
        - model: "gpt-5.5"
          verdict: promote
      meta_reviewer: "gpt-5.5"
      meta_verdict: promote
      kappa: 0.81
    timestamp: "2026-05-29T09:00:00Z"
