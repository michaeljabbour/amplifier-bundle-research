name: empirical-paper
version: 0.2.0
description: |
  Full-rigor empirical research paper for conference and journal submission.
  Complete pre-registration, methodology lockdown, and honest-pivot enforcement.
  Produces IMRAD-structured, venue-ready output with CONSORT/STROBE compliance.

  v0.2.0: Added executable `stages:` block. The pre-existing `modes:`, `defaults:`,
  `behaviors:`, `persona_signals:`, `publish_gates:`, and `special_behavior:` blocks
  are preserved AS DOCUMENTATION below — they encode the design contracts a session
  enforces. The engine ignores them; the executable workflow lives in `stages:`.

# ---------------------------------------------------------------------------
# Input context (engine-bound)
# ---------------------------------------------------------------------------
context:
  cache_only: false                  # v0.8.1: opt-in cache-only mode for committee verification
  judge_cross_vendor_required: true  # v0.8.1: enforce cross-vendor LLM judge per behaviors/cross-vendor-judge.md
  topic: ""                          # Required: research topic / domain area
  prior_work: ""                     # Optional: relevant prior literature summary
  data_source: ""                    # Optional: dataset name / collection plan
  venue: ""                          # Optional: target venue (neurips, icml, nature, ...)

# ===========================================================================
# EXECUTABLE STAGES (engine runs these)
# ===========================================================================
stages:
  # -------------------------------------------------------------------------
  # Stage 1: QUESTION — sharpen research question into testable hypothesis
  # -------------------------------------------------------------------------
  - name: question
    description: "Sharpen research question into a testable, falsifiable hypothesis"
    steps:
      - id: sharpen-question
        agent: research:hypothesis-designer
        prompt: |
          Sharpen the research question for an empirical paper.

          **Topic:** {{topic}}
          **Prior work (if provided):** {{prior_work}}
          **Data source (if provided):** {{data_source}}

          Produce:
          1. A directional, quantified hypothesis (H1) and its null (H0).
          2. The mechanism: why we expect H1 to hold.
          3. Falsifiability: what observation would convince us H1 is false.
          4. Scope and population: to whom/what does H1 generalize?
          5. Primary evidence type: what data answers this?

          Be specific. Avoid vague terms ("may improve", "could help").
        output: sharpened_question
        timeout: 600

  # -------------------------------------------------------------------------
  # Stage 2: PLAN — SHA256-locked pre-registration (LOAD-BEARING APPROVAL GATE)
  # -------------------------------------------------------------------------
  - name: plan
    description: "Methodology + statistical plan + preregistration review (locked)"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        🔒 **Pre-Registration Lock — Methodology Approval Required**

        Before any data is touched, lock the pre-registration. After this point,
        deviations from the plan are flagged as honest-pivots, not silently rewritten.

        **Sharpened question:**
        {{sharpened_question}}

        **Methodology plan:**
        {{methodology_plan}}

        **Statistical plan (primary tests, MDE, multiple-comparison correction):**
        {{statistical_plan}}

        **Preregistration review (hash + signoff):**
        {{preregistration_hash}}

        Required checks before approving:
        - [ ] Hypothesis is directional and quantified
        - [ ] Primary statistical tests specified (with corrections)
        - [ ] Power analysis / MDE present
        - [ ] Honest-pivot clause defined
        - [ ] SHA256 hash of preregistration captured

        ✅ Approve to lock the preregistration and proceed to /execute.
        ❌ Deny to revise plan before locking.

    steps:
      - id: methodology-design
        agent: research:methodologist
        prompt: |
          Design the methodology for testing this hypothesis:

          {{sharpened_question}}

          Lock the design choices that must be fixed before data collection:
          - Study design (RCT, observational, quasi-experimental, ...)
          - Population and sampling
          - Independent / dependent variables and operationalization
          - Controls and confounds
          - Measurement instruments and reliability
          - Procedures (timing, ordering, randomization)
          - Compliance with CONSORT/STROBE for the study type

          Produce a methodology plan suitable for pre-registration.
        output: methodology_plan
        timeout: 900

      - id: statistical-plan
        agent: research:statistician
        prompt: |
          Define the statistical plan that locks data analysis BEFORE seeing results.

          **Hypothesis:** {{sharpened_question}}
          **Methodology:** {{methodology_plan}}

          Lock:
          - Primary statistical test(s) and the assumptions they require
          - Sample size / power analysis (target power 0.80, alpha 0.05 unless justified)
          - Minimum detectable effect (MDE) and rationale
          - Multiple-comparison correction strategy (Bonferroni, BH-FDR, etc.)
          - Pre-specified secondary / exploratory analyses (clearly labeled)
          - What counts as a deviation that triggers honest-pivot

          Output an analysis plan ready for pre-registration.
        output: statistical_plan
        timeout: 900
        depends_on: [methodology-design]

      - id: preregistration-review
        agent: research:preregistration-reviewer
        prompt: |
          Review the assembled pre-registration for an empirical paper.

          **Methodology plan:**
          {{methodology_plan}}

          **Statistical plan:**
          {{statistical_plan}}

          Tasks:
          1. Verify completeness (hypotheses, methods, analyses, deviation rules).
          2. Identify any ambiguity that would let post-hoc rationalization slip in.
          3. Compute (or simulate) a SHA256 hash of the canonicalized preregistration
             text and report it as the lock value.
          4. Recommend any edits needed before locking.

          Return the preregistration hash and a yes/no on lock-readiness.
        output: preregistration_hash
        timeout: 600
        depends_on: [statistical-plan]

  # -------------------------------------------------------------------------
  # Stage 3: EXECUTE — run pre-registered analysis
  # -------------------------------------------------------------------------
  - name: execute
    description: "Execute pre-registered analysis; log any deviations as honest-pivots"
    steps:
      - id: run-analysis
        agent: research:statistician
        prompt: |
          Execute the pre-registered analysis plan.

          **Locked plan (hash {{preregistration_hash}}):**
          - Methodology: {{methodology_plan}}
          - Statistical plan: {{statistical_plan}}

          **Data source:** {{data_source}}

          Tasks:
          1. Run primary statistical tests exactly as pre-registered.
          2. Run pre-specified secondary analyses.
          3. Any analysis NOT in the pre-registration is labeled "exploratory".
          4. Any deviation from the locked plan is logged as an honest-pivot
             with rationale (do NOT rewrite the plan; flag the deviation).
          5. Produce results tables (point estimates + CIs) for primary outcomes.
          6. Produce figures for primary outcomes (quality-checked).

          Return: results, deviation log, exploratory log, figures manifest.
        output: results
        timeout: 1800

  # -------------------------------------------------------------------------
  # Stage 4: CRITIQUE — methodology review + cross-vendor LLM judge
  # -------------------------------------------------------------------------
  - name: critique
    description: "Honest-critic review with cross-vendor judge enforcement (pre-rebuttal)"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        🔍 **Critique Approval — Pre-Rebuttal Review**

        Review the honest-critic's findings before they enter the draft. The
        cross-vendor judge requirement (per behaviors/cross-vendor-judge.md)
        means rubric-graded items below were scored by a model from a
        different vendor family than the drafter.

        **Critique:**
        {{critique}}

        Required checks:
        - [ ] Methodology rigor (CONSORT/STROBE) addressed
        - [ ] Statistical validity (assumptions, power, MCC) addressed
        - [ ] Honest-pivot deviations all flagged
        - [ ] Exploratory findings labeled
        - [ ] Overclaim detection completed
        - [ ] Cross-vendor judge actually crossed vendors (verify fallback chain)

        ✅ Approve to incorporate critique into draft.
        ❌ Deny to re-run critique (e.g., wrong judge family).

    steps:
      - id: honest-critique
        agent: research:honest-critic
        # Cross-vendor judge enforcement (v0.8.1, judge_cross_vendor_required: true).
        # Reasoning class first, then explicit fallbacks across two vendor families
        # so rubric grading is never single-vendor.
        # Cross-vendor judge enforcement (v0.8.1; judge_cross_vendor_required: true).
        # Explicit fallbacks across two vendor families so rubric grading is never
        # single-vendor — Anthropic critique-class first, OpenAI second, then a
        # cheaper Anthropic backstop. Per behaviors/cross-vendor-judge.md.
        provider_preferences:
          - provider: anthropic
            model: claude-opus-*
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          Honest-critic review of the empirical paper draft material.

          **Question:** {{sharpened_question}}
          **Locked methodology / statistics:** {{methodology_plan}} / {{statistical_plan}}
          **Preregistration hash:** {{preregistration_hash}}
          **Results & deviation log:** {{results}}

          Score each rubric item (1–5) AND describe weaknesses concretely:
          1. Methodology rigor — CONSORT/STROBE compliance for the study type.
          2. Statistical validity — assumptions, power, multiple-comparison correction.
          3. Honest-pivot enforcement — every deviation explicitly flagged?
          4. Exploratory labeling — every unregistered finding tagged?
          5. Overclaim detection — claims match evidence strength (no "significantly", "best", ...)
          6. Generalization — population scope honestly stated?

          Be uncharitable. If a finding is post-hoc, say so. If power is too low,
          say so. Return a structured critique with rubric scores and required edits.
        output: critique
        timeout: 1200

  # -------------------------------------------------------------------------
  # Stage 5: DRAFT — IMRAD draft (architect → write → figures → cite → ML peer review)
  # -------------------------------------------------------------------------
  - name: draft
    description: "IMRAD draft: architect, technical writer, figures, citations, ML peer review"
    steps:
      - id: paper-architecture
        agent: research:research-paper-architect
        prompt: |
          Plan the IMRAD structure for this empirical paper before writing.

          **Question:** {{sharpened_question}}
          **Methodology:** {{methodology_plan}}
          **Results:** {{results}}
          **Critique to incorporate:** {{critique}}

          Produce:
          1. Section outline (Abstract, Intro, Methods, Results, Discussion, Limitations, References).
          2. Per-section key claims and supporting evidence map.
          3. Where exploratory findings live and how they are labeled.
          4. Where preregistration deviations are flagged in-text.
          5. Figure plan and which result each figure supports.
          6. Target venue conventions: {{venue}}.
        output: paper_architecture
        timeout: 600

      - id: write-paper
        agent: research:research-technical-writer
        prompt: |
          Write the IMRAD paper body following the architecture.

          **Architecture:** {{paper_architecture}}
          **Question:** {{sharpened_question}}
          **Methodology:** {{methodology_plan}}
          **Results:** {{results}}
          **Critique:** {{critique}}

          Constraints:
          - Match claims to evidence strength; no overclaiming.
          - Label every exploratory finding inline.
          - Flag every preregistration deviation in Results / Discussion.
          - Honor honest-pivot disclosure rules (strict).
        output: paper_body
        timeout: 1500
        depends_on: [paper-architecture]

      - id: design-figures
        agent: research:figure-designer
        prompt: |
          Design and finalize figures for the paper.

          **Architecture:** {{paper_architecture}}
          **Results:** {{results}}

          For each figure:
          - Caption that stands alone (claim + method + sample size).
          - Confidence intervals shown where applicable.
          - Color-blind-safe palette.
          - Pre-registered vs. exploratory clearly distinguished.
        output: figures
        timeout: 1200
        depends_on: [paper-architecture]

      - id: manage-citations
        agent: research:research-citation-manager
        prompt: |
          Build the reference list and verify citations.

          **Paper body:** {{paper_body}}
          **Citation style:** APA (per defaults).

          Tasks:
          - Verify every in-text cite has a matching reference entry.
          - Flag any unverifiable / hallucinated citations.
          - Ensure key prior work is cited where claims depend on it.
        output: citations
        timeout: 600
        depends_on: [write-paper]

      - id: ml-peer-review
        agent: research:ml-paper-reviewer
        # NEW v0.8.0: NeurIPS-style rubric review with calibration warning.
        prompt: |
          NeurIPS-style peer review of the assembled empirical paper.

          **Paper body:** {{paper_body}}
          **Figures:** {{figures}}
          **Citations:** {{citations}}
          **Original critique:** {{critique}}

          Score on the standard ML reviewer rubric (soundness, presentation,
          contribution, originality, significance) AND output a calibration
          warning if your scores look unusually high or low for this evidence.
        output: ml_review
        timeout: 900
        depends_on: [write-paper, design-figures, manage-citations]
        on_error: continue  # peer review is informative; don't block draft assembly

      - id: assemble-draft
        agent: research:research-technical-writer
        prompt: |
          Assemble the final IMRAD draft package.

          - Paper body: {{paper_body}}
          - Figures: {{figures}}
          - Citations: {{citations}}
          - ML peer review notes: {{ml_review}}

          Incorporate ml_review feedback that is non-controversial; surface
          contested points as Discussion items rather than silently accepting.
          Output a single coherent draft ready for /publish.
        output: draft_complete
        timeout: 900
        depends_on: [ml-peer-review]

  # -------------------------------------------------------------------------
  # Stage 6: PUBLISH — venue-ready output (FINAL APPROVAL GATE)
  # -------------------------------------------------------------------------
  - name: publish
    description: "Venue-ready packaging with final human approval"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        📤 **Publish Approval — Final Output Gate**

        Final review before producing venue-ready artifacts.

        **Draft:**
        {{draft_complete}}

        Required checks:
        - [ ] Critique addressed (or contested points surfaced in Discussion)
        - [ ] Honest-pivot deviations all acknowledged in-text
        - [ ] Preregistration hash recorded in supplement: {{preregistration_hash}}
        - [ ] Exploratory findings labeled
        - [ ] No overclaim flags remain
        - [ ] Target venue: {{venue}}

        ✅ Approve to format for venue submission.
        ❌ Deny to revise.

    steps:
      - id: format-for-venue
        agent: research:venue-formatter
        prompt: |
          Format the draft for venue submission.

          **Draft:** {{draft_complete}}
          **Target venue:** {{venue}}
          **Preregistration hash (record in supplement):** {{preregistration_hash}}

          Produce:
          - paper.latex / paper.pdf in venue style.
          - supplement.pdf with extended methodology + figures.
          - preregistration.yaml + preregistration.hash.
          - analysis-log.txt (deviation log).
        output: venue_ready_doc
        timeout: 900

# Recursion protection
recursion:
  max_depth: 2
  max_total_steps: 60

# ===========================================================================
# DESIGN-CONTRACT DOCUMENTATION (preserved from v0.1.0; engine ignores these
# top-level blocks but they encode the per-mode contracts that a /command
# session enforces. Keep them as the design source-of-truth.)
# ===========================================================================

modes:
  - id: question
    purpose: Sharpen research question into testable hypothesis
    persona_hint: |
      Expect Persona B (researcher, PI, or experienced analyst). Ask for the core
      claim, the mechanism, and what evidence would convince you the claim is false.
  - id: plan
    purpose: SHA256-locked pre-registration
    emphasis:
      - hypothesis_specificity
      - methodology_details
      - statistical_plan
      - honest_pivot_clause
    special_behavior:
      - sha256_hash_preregistration: true
      - sign_commitment_hash: true
  - id: execute
    purpose: Run pre-registered analysis and generate figures
    tools:
      - analysis-executor:
          enforce_preregistration: true
          log_deviations: true
      - figure-generator:
          quality_check: true
      - statistics-reporter:
          format: apa
  - id: critique
    purpose: Full methodology review with CONSORT/STROBE scoring
    emphasis:
      - methodology_rigor
      - statistical_validity
      - honest_pivot_enforcement
      - exploratory_labeling
      - overclaim_detection
  - id: draft
    purpose: Venue-ready IMRAD structure
    template: templates/imrad-skeleton.latex
    sections:
      - abstract
      - introduction
      - methods
      - results
      - discussion
      - limitations
      - references
    post_processing:
      - exploratory_findings_labeled: true
      - preregistration_deviation_flagged: true
  - id: publish
    purpose: Venue submission ready
    venue: configurable
    output_formats: [latex, docx, pdf]
    artifacts:
      - paper.latex
      - paper.pdf
      - preregistration.yaml
      - preregistration.hash
      - supplement.pdf
      - analysis-log.txt

defaults:
  honest_pivot: true
  exploratory_labeling: true
  preregistration_required: true
  preregistration_venue: osf
  citation_style: apa
  double_blind_ready: true

publish_gates:
  critique_required:
    enabled: true
    description: |
      /publish refuses to execute until at least one /critique pass has produced
      a critique_report artifact for the current draft.
    enforcement: block
    bypass: "--no-critique-gate"
    bypass_warning: |
      Publishing without a critique pass. The output's metadata will record
      that critique was bypassed.
    artifact_required: critique.yaml
  honest_pivot_acknowledged:
    enabled: true
    description: |
      If /execute produced findings that diverge from the pre-registration,
      /publish requires the user has acknowledged each divergence.
    enforcement: block
    bypass: null
  quality_gates:
    - name: methodology_score
      condition: scholar-eval CONSORT/STROBE score ≥4.0/5.0
      on_fail: block
    - name: statistical_validity
      condition: all statistical assumptions checked and reported
      on_fail: block
    - name: honest_pivot_resolution
      condition: all deviations from pre-registration either authorized or flagged
      on_fail: block
    - name: exploratory_labeling
      condition: all unregistered findings labeled "exploratory" in text
      on_fail: block
    - name: overclaim_detection
      condition: no unqualified claims beyond evidence strength
      on_fail: warn

behaviors:
  honest_pivot:
    enforcement: strict
    surfaces:
      - preregistration comparison table
      - deviation callouts in Results
      - note in Discussion
  exploratory_labeling:
    enforcement: automatic
    surfaces:
      - inline labels in Results
      - subsection in Discussion
      - metadata in submission package

persona_signals:
  persona_b_indicators:
    - user references hypothesis, design, or analysis plan
    - user has data or experimental code ready
    - user names a venue (NeurIPS, Nature, etc.)
  persona_c_indicators:
    - user invokes /critique on a completed empirical paper
    - user requests CONSORT/STROBE scoring
