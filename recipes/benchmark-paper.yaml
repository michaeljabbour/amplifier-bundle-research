name: benchmark-paper
version: 0.2.0
description: |
  Benchmark evaluation paper specialized for dataset releases, method comparisons,
  and performance evaluations. Includes protocol definition, fairness checks,
  and reproducibility appendix. ML-flavored throughout.

  v0.2.0: Added executable `stages:` block. The pre-existing `modes:`, `defaults:`,
  `behaviors:`, `persona_signals:`, and `publish_gates:` blocks are preserved AS
  DOCUMENTATION below — they encode the design contracts a session enforces. The
  engine ignores them; the executable workflow lives in `stages:`.

# ---------------------------------------------------------------------------
# Input context (engine-bound)
# ---------------------------------------------------------------------------
context:
  cache_only: false                  # v0.8.1: opt-in cache-only mode for committee verification
  judge_cross_vendor_required: true  # v0.8.1: enforce cross-vendor LLM judge per behaviors/cross-vendor-judge.md
  topic: ""                          # Required: what is being benchmarked
  baselines: ""                      # Optional: list of baseline methods/models
  metrics: ""                        # Optional: target evaluation metrics
  venue: ""                          # Optional: target venue (neurips, icml, ...)

# ===========================================================================
# EXECUTABLE STAGES (engine runs these)
# ===========================================================================
stages:
  # -------------------------------------------------------------------------
  # Stage 1: QUESTION — what is being evaluated and what would success look like
  # -------------------------------------------------------------------------
  - name: question
    description: "Sharpen what is being evaluated and what counts as success"
    steps:
      - id: sharpen-question
        agent: research:hypothesis-designer
        prompt: |
          Sharpen the evaluation question for a benchmark paper.

          **Topic:** {{topic}}
          **Candidate baselines:** {{baselines}}
          **Candidate metrics:** {{metrics}}

          Produce:
          1. The evaluation claim (e.g., "method X outperforms baselines Y, Z on metric M
             under conditions C with statistical significance").
          2. Which methods/models are in scope and why.
          3. Which metrics matter and what each measures.
          4. What would constitute a "successful" evaluation.
          5. Failure modes that would invalidate the comparison.
        output: sharpened_question
        timeout: 600

  # -------------------------------------------------------------------------
  # Stage 2: PLAN — lock benchmark protocol (LOAD-BEARING APPROVAL GATE)
  # -------------------------------------------------------------------------
  - name: plan
    description: "Benchmark protocol + statistical plan + preregistration review"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        🔒 **Benchmark Protocol Lock — Approval Required**

        Lock the benchmark protocol BEFORE running any baselines. After lock,
        deviations (e.g., extra hyperparameter tuning for one baseline) are
        flagged as honest-pivots, not silently rewritten.

        **Sharpened evaluation question:**
        {{sharpened_question}}

        **Methodology / protocol:**
        {{methodology_plan}}

        **Statistical plan (significance tests, CIs, seed strategy):**
        {{statistical_plan}}

        **Preregistration review (hash):**
        {{preregistration_hash}}

        Required checks:
        - [ ] Evaluation procedure exactly reproducible
        - [ ] Baseline tuning effort comparable across methods
        - [ ] Metrics linked to evaluation goal
        - [ ] Random seeds + hardware + env pinned
        - [ ] Significance test or CI strategy defined
        - [ ] SHA256 hash captured

        ✅ Approve to lock and run benchmarks.
        ❌ Deny to revise.

    steps:
      - id: methodology-design
        agent: research:methodologist
        prompt: |
          Design the benchmark protocol.

          **Question:** {{sharpened_question}}

          Lock:
          - Evaluation procedure (data splits, eval scripts, exact metric impls).
          - Baselines selected and rationale; tuning budget per baseline.
          - Random seed strategy (how many seeds, which ones, how aggregated).
          - Environment: hardware, library versions, OS.
          - Reproducibility checklist coverage.
          - What disqualifies a result (e.g., training-on-test, leak, data dup).
        output: methodology_plan
        timeout: 900

      - id: statistical-plan
        agent: research:statistician
        prompt: |
          Define the statistical plan for the benchmark.

          **Methodology:** {{methodology_plan}}

          Lock:
          - Primary comparison: which methods, which metric, on which split.
          - Significance test (paired t-test, bootstrap CI, Wilcoxon, ...) + assumptions.
          - Multiple-comparison correction across method × metric grid.
          - Variance reporting (seed std, bootstrap CI, ...).
          - Power analysis: minimum detectable difference at chosen sample size.
          - Pre-registered ablations vs. exploratory ablations.
        output: statistical_plan
        timeout: 900
        depends_on: [methodology-design]

      - id: preregistration-review
        agent: research:preregistration-reviewer
        prompt: |
          Review the assembled benchmark pre-registration.

          **Methodology / protocol:** {{methodology_plan}}
          **Statistical plan:** {{statistical_plan}}

          Tasks:
          1. Verify completeness against the reproducibility checklist.
          2. Identify ambiguity that would let post-hoc result-shopping slip in.
          3. Compute/simulate SHA256 hash of the canonicalized preregistration.
          4. Recommend any edits needed before locking.

          Return the hash and a yes/no on lock-readiness.
        output: preregistration_hash
        timeout: 600
        depends_on: [statistical-plan]

  # -------------------------------------------------------------------------
  # Stage 3: EXECUTE — run benchmarks
  # -------------------------------------------------------------------------
  - name: execute
    description: "Run benchmarks with pinned seeds; aggregate results with variance"
    steps:
      - id: run-benchmarks
        agent: research:statistician
        prompt: |
          Execute the locked benchmark protocol.

          **Locked plan (hash {{preregistration_hash}}):**
          - Methodology: {{methodology_plan}}
          - Statistical plan: {{statistical_plan}}

          Tasks:
          1. Run every baseline on every split with the pinned seeds.
          2. Capture variance across seeds (std, bootstrap CI).
          3. Apply the pre-registered statistical tests.
          4. Any analysis NOT in the pre-registration is labeled "exploratory".
          5. Any deviation (e.g., extra tuning for one baseline) is logged as
             an honest-pivot with rationale; do NOT silently rewrite.
          6. Produce results tables and performance plots (quality-checked).

          Return: results, deviation log, exploratory log, figures manifest.
        output: results
        timeout: 1800

  # -------------------------------------------------------------------------
  # Stage 4: CRITIQUE — fairness, validity, generalization + ML peer review
  # -------------------------------------------------------------------------
  - name: critique
    description: "Honest-critic + ML peer review (NeurIPS rubric); cross-vendor judge"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        🔍 **Critique Approval — Pre-Rebuttal Review**

        Review honest-critic findings AND the ML peer review (NeurIPS rubric)
        before they enter the draft. Cross-vendor judge enforcement is active.

        **Honest critique:**
        {{critique}}

        **ML peer review (NeurIPS rubric + calibration warning):**
        {{ml_review}}

        Required checks:
        - [ ] Baseline fairness assessed (comparable tuning effort)
        - [ ] Metric validity addressed
        - [ ] Statistical power addressed (CIs on every comparison)
        - [ ] Generalization claims bounded
        - [ ] Reproducibility checklist verified
        - [ ] Cross-vendor judge actually crossed vendors

        ✅ Approve to incorporate critique into draft.
        ❌ Deny to re-run.

    steps:
      - id: honest-critique
        agent: research:honest-critic
        # Cross-vendor judge enforcement (v0.8.1; judge_cross_vendor_required: true).
        # Explicit fallbacks across two vendor families so rubric grading is never
        # single-vendor. Per behaviors/cross-vendor-judge.md.
        provider_preferences:
          - provider: anthropic
            model: claude-opus-*
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          Honest-critic review of the benchmark paper material.

          **Question:** {{sharpened_question}}
          **Locked methodology:** {{methodology_plan}}
          **Statistical plan:** {{statistical_plan}}
          **Preregistration hash:** {{preregistration_hash}}
          **Results & deviation log:** {{results}}

          Score (1–5) AND describe weaknesses concretely:
          1. Baseline fairness — were baselines tuned with comparable effort?
          2. Metric validity — do metrics measure what's claimed?
          3. Statistical power — confidence intervals on every comparison?
          4. Generalization — claims bounded to evaluated conditions?
          5. Reproducibility — seeds/versions/hardware fully documented?
          6. Honest-pivot enforcement — every deviation flagged?

          Be uncharitable. If a baseline got more tuning, say so loudly.
        output: critique
        timeout: 1200

      - id: ml-peer-review
        agent: research:ml-paper-reviewer
        # NEW v0.8.0: NeurIPS-style rubric peer review with calibration warning.
        # Cross-vendor judge enforcement also applies to this rubric step.
        provider_preferences:
          - provider: openai
            model: gpt-*
          - provider: anthropic
            model: claude-opus-*
          - provider: anthropic
            model: claude-sonnet-*
        prompt: |
          NeurIPS-style peer review of the benchmark paper material.

          **Question:** {{sharpened_question}}
          **Methodology:** {{methodology_plan}}
          **Statistical plan:** {{statistical_plan}}
          **Results:** {{results}}
          **Honest critique already produced:** {{critique}}

          Score on the standard ML reviewer rubric:
          - Soundness (1–4)
          - Presentation (1–4)
          - Contribution (1–4)
          - Originality (1–4)
          - Significance (1–4)
          - Confidence (1–5)

          THEN output a calibration warning if your scores look unusually
          high or low for this evidence (and explain why). Note any items
          that the honest-critic missed or that you would weight differently.
        output: ml_review
        timeout: 1200
        depends_on: [honest-critique]

  # -------------------------------------------------------------------------
  # Stage 5: DRAFT — benchmark paper structure
  # -------------------------------------------------------------------------
  - name: draft
    description: "Architect → write → figures → cite → final assembly"
    steps:
      - id: paper-architecture
        agent: research:research-paper-architect
        prompt: |
          Plan the benchmark-paper structure before writing.

          **Question:** {{sharpened_question}}
          **Methodology:** {{methodology_plan}}
          **Results:** {{results}}
          **Critique to incorporate:** {{critique}}
          **ML peer review:** {{ml_review}}

          Produce:
          1. Section outline (Abstract, Intro, Protocol, Baselines, Setup,
             Results, Analysis, Discussion, Reproducibility Appendix).
          2. Per-section key claims and evidence map.
          3. Figure / table plan for primary comparisons + ablations.
          4. Where exploratory ablations are labeled as such.
          5. Where preregistration deviations are flagged in-text.
          6. Target venue conventions: {{venue}}.
        output: paper_architecture
        timeout: 600

      - id: write-paper
        agent: research:research-technical-writer
        prompt: |
          Write the benchmark paper body following the architecture.

          **Architecture:** {{paper_architecture}}
          **Results:** {{results}}
          **Critique:** {{critique}}
          **ML peer review:** {{ml_review}}

          Constraints:
          - Match claims to evidence strength; no overclaiming on benchmark wins.
          - Always report variance / CIs alongside point estimates.
          - Label every exploratory ablation inline.
          - Flag every preregistration deviation in Results / Analysis.
        output: paper_body
        timeout: 1500
        depends_on: [paper-architecture]

      - id: design-figures
        agent: research:figure-designer
        prompt: |
          Design the benchmark figures and tables.

          **Architecture:** {{paper_architecture}}
          **Results:** {{results}}

          For each figure / table:
          - Standalone caption (claim + method + sample size + variance).
          - Confidence intervals or seed std visible.
          - Color-blind-safe palette.
          - Pre-registered vs. exploratory clearly distinguished.
          - Reproducibility appendix companion.
        output: figures
        timeout: 1200
        depends_on: [paper-architecture]

      - id: manage-citations
        agent: research:research-citation-manager
        prompt: |
          Build the reference list and verify citations.

          **Paper body:** {{paper_body}}
          **Citation style:** APA (per defaults).

          Verify every in-text cite is real and reachable. Flag hallucinated
          citations. Ensure all baselines are cited with their original papers.
        output: citations
        timeout: 600
        depends_on: [write-paper]

      - id: assemble-draft
        agent: research:research-technical-writer
        prompt: |
          Assemble the final benchmark-paper draft package.

          - Paper body: {{paper_body}}
          - Figures / tables: {{figures}}
          - Citations: {{citations}}

          Output a single coherent draft ready for /publish.
        output: draft_complete
        timeout: 900
        depends_on: [design-figures, manage-citations]

  # -------------------------------------------------------------------------
  # Stage 6: PUBLISH — venue-ready output (FINAL APPROVAL GATE)
  # -------------------------------------------------------------------------
  - name: publish
    description: "Venue-ready packaging with final human approval"
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        📤 **Publish Approval — Final Output Gate**

        Final review before producing venue-ready artifacts.

        **Draft:** {{draft_complete}}

        Required checks:
        - [ ] All baselines complete (or missing baselines documented)
        - [ ] Reproducibility checklist filled
        - [ ] All comparisons include CIs or significance tests
        - [ ] Fairness assessment present
        - [ ] Each metric justified
        - [ ] Preregistration hash recorded: {{preregistration_hash}}

        ✅ Approve to format for venue submission.
        ❌ Deny to revise.

    steps:
      - id: format-for-venue
        agent: research:venue-formatter
        prompt: |
          Format the benchmark draft for venue submission.

          **Draft:** {{draft_complete}}
          **Target venue:** {{venue}}
          **Preregistration hash (record in supplement):** {{preregistration_hash}}

          Produce:
          - paper.pdf (and .docx where appropriate).
          - results-table.xlsx + results-figures/.
          - reproducibility-checklist.yaml.
          - preregistration.yaml.
          - code-snapshot/ (if applicable).
        output: venue_ready_doc
        timeout: 900

# Recursion protection
recursion:
  max_depth: 2
  max_total_steps: 60

# ===========================================================================
# DESIGN-CONTRACT DOCUMENTATION (preserved from v0.1.0; engine ignores these
# top-level blocks but they encode the per-mode contracts that a /command
# session enforces. Keep them as the design source-of-truth.)
# ===========================================================================

modes:
  - id: question
    purpose: Clarify what is being evaluated and success criteria
    persona_hint: |
      Expect Persona B (ML researcher, data scientist, or benchmarking engineer).
      Ask what baselines are being compared, what metrics matter, and what would
      constitute a "successful" evaluation.
  - id: plan
    purpose: Lock benchmark protocol, baselines, and statistical tests
    emphasis:
      - protocol_definition
      - baseline_selection
      - metrics_rationale
      - statistical_tests
      - random_seed_strategy
  - id: execute
    purpose: Run benchmarks with pinned seeds and collect results
    tools:
      - benchmark-runner:
          seed_management: pinned
          log_environment: true
          capture_variance: true
      - results-aggregator:
          format: structured
      - performance-plotter:
          quality_check: true
  - id: critique
    purpose: Fairness, validity, and generalization checks
    emphasis:
      - baseline_fairness
      - metric_validity
      - statistical_power
      - generalization_claims
      - reproducibility_checklist
  - id: draft
    purpose: Benchmark paper structure
    template: templates/benchmark-skeleton.md
    sections:
      - abstract
      - introduction
      - benchmark-protocol
      - baselines-and-methods
      - experimental-setup
      - results
      - analysis
      - discussion
      - reproducibility-appendix
  - id: publish
    purpose: Benchmark-ready publication
    output_formats: [pdf, docx]
    artifacts:
      - paper.pdf
      - results-table.xlsx
      - results-figures/
      - reproducibility-checklist.yaml
      - preregistration.yaml
      - code-snapshot/

defaults:
  honest_pivot: true
  exploratory_labeling: true
  preregistration_required: true
  citation_style: apa
  random_seed_pinning: required

publish_gates:
  critique_required:
    enabled: true
    description: |
      /publish refuses to execute until at least one /critique pass has produced
      a critique_report artifact for the current draft.
    enforcement: block
    bypass: "--no-critique-gate"
    bypass_warning: |
      Publishing without a critique pass. The output's metadata will record
      that critique was bypassed.
    artifact_required: critique.yaml
  honest_pivot_acknowledged:
    enabled: true
    description: |
      If /execute produced findings that diverge from the pre-registration,
      /publish requires the user has acknowledged each divergence.
    enforcement: block
    bypass: null
  quality_gates:
    - name: all_baselines_complete
      condition: all announced baselines have results; missing baselines documented
      on_fail: block
    - name: reproducibility_checklist
      condition: seeds, versions, hardware, and environment fully documented
      on_fail: block
    - name: statistical_reporting
      condition: all comparisons include confidence intervals or significance tests
      on_fail: warn
    - name: fairness_assessment
      condition: baselines reviewed for comparable tuning effort
      on_fail: block
    - name: metric_justification
      condition: each metric linked to evaluation goal
      on_fail: warn

persona_signals:
  persona_b_indicators:
    - user is comparing multiple methods or models
    - user names evaluation metrics or baselines
    - user has results or code ready
  persona_c_indicators:
    - user invokes /critique on a benchmark paper
    - user requests reproducibility review
