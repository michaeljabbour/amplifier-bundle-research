# orchestrated-loop.yaml — H3 enabler from the v3 program paper
#
# Phase-1 → Phase-2 → reconfigure → re-run, expressed as the canonical
# Amplifier recipe pattern: a `type: recipe` step with `while_condition` +
# `max_while_iterations` + `update_context`, calling
# `orchestrated-loop-iteration.yaml` as the iteration body.
#
# Canonical reference: @recipes:examples/attractor/attractor.yaml Stage 3
# (factory). This recipe follows the same shape end to end.
#
# H3 evidence target (v3 paper §H3): closure rate >= 2x no-op control AND
# knowledge-tracking on date-stamped questions rises after corpus update.

name: orchestrated-loop
version: 0.2.0
description: |
  Phase-1 → Phase-2 orchestrated convergence loop. Operationalizes the v3
  program paper's H3 outcome hypothesis. Each iteration: propose a bundle
  overlay addressing open residuals, run the benchmark with the overlay,
  run a no-op-drift arm in parallel, adjudicate residual closure (blinded),
  judge satisfaction (cross-vendor). Loop until converged or max_rounds.

  Companion sub-recipes (must be in the same recipes directory):
    - orchestrated-loop-iteration.yaml (the iteration body)
    - bundle-overlay-proposer.yaml     (proposer of new overlays)
    - residual-adjudicator.yaml        (blinded adjudication)

context:
  benchmark_corpus: ""
  baseline_bundle_overlay: ""
  knowledge_tracking_corpus: ""
  max_rounds: 5
  closure_target: 0.50
  enable_no_op_arm: "true"
  enable_blinded_adjudication: "true"

  # Loop state (mutated via update_context: in the while step)
  converged: "false"
  open_residuals: []
  closed_residuals: []
  reformulated_residuals: []
  reopened_residuals: []
  round_metrics: []

stages:

  - name: pre-registration
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        Pre-registration of orchestrated-loop run

        You are about to start a {{max_rounds}}-round bundle-overlay loop.
        Once approved, the closure rule, residual-ledger schema, and
        adjudication contract are SHA-256-locked.

        Closure rule:
          - residual = "closed" iff its frozen original_wording's failure
            mode is fixed AND not reopened by a later round
          - reformulation does NOT count as closure
          - severity-weighted closure (w1=1, w2=2, w3=4) reported alongside
            count-based closure
        Convergence: closure rate >= {{closure_target}} AND >= 2x no-op rate
        No-op arm: {{enable_no_op_arm}}
        Blinded adjudication: {{enable_blinded_adjudication}}

        Approve to lock and begin / Deny to revise

    steps:
      - id: emit-residual-schema
        agent: research:research-coordinator
        prompt: |
          Emit the residual-ledger schema for this run, exactly as specified
          in the v3 program paper "Residual-ledger schema":
            residual_id, round_introduced, original_wording (frozen),
            severity (1=cosmetic / 2=scoped / 3=load-bearing),
            evidence_artifact, closure_criterion,
            allowed_resolution {closed, open, reformulated, superseded},
            adjudicator_blinded, round_closed, reopened.
          Output as YAML.
        output: residual_schema

      - id: hash-lock
        agent: research:preregistration-reviewer
        prompt: |
          Compute SHA-256 of residual schema + closure rule + no-op arm spec
          + adjudication contract. From this point forward, any change to
          these documents is a recipe-level deviation that must be surfaced
          via honest-pivot.
        output: preregistration_hash

  - name: baseline-round-0
    steps:
      - id: run-baseline
        type: recipe
        recipe: empirical-paper.yaml
        context:
          bundle_overlay: "{{baseline_bundle_overlay}}"
          benchmark: "{{benchmark_corpus}}"
          knowledge_corpus: "{{knowledge_tracking_corpus}}"
          mode: "measurement-only"
        output: baseline_result
        parse_json: true

      - id: extract-baseline-residuals
        agent: research:research-coordinator
        prompt: |
          From {{baseline_result}}, extract the named residuals (severity-
          tagged) emitted during the /critique stage. Initialize the loop
          state with these as the open_residuals.

          Emit a single JSON object with the fields:
            open_residuals: [list of residual records]
            baseline_metrics: <copy of {{baseline_result}}>
        output: baseline_state
        parse_json: true

  - name: phase2-loop
    steps:
      - id: phase2-iteration
        type: recipe
        recipe: ./orchestrated-loop-iteration.yaml
        context:
          open_residuals: "{{baseline_state.open_residuals}}"
          baseline_bundle_overlay: "{{baseline_bundle_overlay}}"
          benchmark_corpus: "{{benchmark_corpus}}"
          knowledge_tracking_corpus: "{{knowledge_tracking_corpus}}"
          prior_round_metrics: "{{round_metrics}}"
          enable_no_op_arm: "{{enable_no_op_arm}}"
          enable_blinded_adjudication: "{{enable_blinded_adjudication}}"
          closure_target: "{{closure_target}}"
        output: iteration_result
        parse_json: true
        while_condition: "{{converged}} != 'true'"
        max_while_iterations: 5
        break_when: "{{converged}} == 'true'"
        update_context:
          converged: "{{iteration_result.iteration_summary.converged}}"
          open_residuals: "{{iteration_result.iteration_summary.still_open}}"

  - name: synthesis
    approval:
      required: true
      timeout: 0
      default: deny
      prompt: |
        Loop synthesis review

        Headline numbers (frozen):
          rounds executed: max {{max_rounds}}
          converged: {{converged}}
          residuals still open: {{open_residuals}}

        Approve to commit synthesis / Deny to investigate residuals

    steps:
      - id: closure-vs-noop-analysis
        agent: research:statistician
        prompt: |
          Compare the loop arm's per-round closure rates to the no-op arm's
          per-round rates, using the round_metrics list. Use a paired test
          (loop vs no-op on the same baseline residuals).
          Report:
            - point estimate: closure_rate / no_op_rate
            - 95% Wilson CI on the ratio
            - severity-weighted variant
            - whether ratio CI lower bound > 2.0 (H3 first-conjunct pass)
          Flag oscillation: any residual that flipped open->closed->open
          across rounds is a ratchet failure even if final state is closed.
        output: closure_analysis

      - id: knowledge-tracking-timing
        agent: research:statistician
        prompt: |
          Across rounds, compare specialist accuracy on knowledge-tracking
          corpus's date-stamped questions to timing of corpus updates.
          Report Spearman rank correlation between round_introduced_in_corpus
          and round_first_correctly_answered. Pre-registered alpha = 0.05;
          report p and 95% bootstrap CI.
          Disconfirmation: rho indistinguishable from 0, anti-correlation,
          or constant-correct (= pre-training contamination, NOT tracking).
        output: tracking_analysis

      - id: write-loop-paper-section
        agent: research:technical-writer
        prompt: |
          Write the H3-evidence section using the v3 paper's H3 template.
          Required sections:
            (1) Pre-registration hash + closure rule
            (2) Round-by-round table
            (3) Closure-vs-no-op analysis (point + Wilson CI)
            (4) Knowledge-tracking timing analysis (rho + bootstrap CI)
            (5) Honest residuals
            (6) H3 verdict: supported / partial / not-supported
          Closure analysis: {{closure_analysis}}
          Tracking analysis: {{tracking_analysis}}
        output: h3_section
