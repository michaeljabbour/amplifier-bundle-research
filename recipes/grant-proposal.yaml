name: grant-proposal
version: 0.1.0
description: |
  Grant proposal for funding agencies (NSF, NIH, DARPA, etc.). Designed for PIs
  and researchers to produce defensible, well-powered research plans. Skips /execute
  (no data collection yet) and emphasizes feasibility and innovation scoring.

# ---------------------------------------------------------------------------
# Mode sequence — reduced pipeline (no /execute — no data yet)
# ---------------------------------------------------------------------------
modes:
  - id: question
    purpose: Sharpen research question and articulate significance
    persona_hint: |
      Expect Persona B (PI or researcher). Ask what problem the grant addresses,
      why it matters, and what would count as success. Avoid jargon; clarify intent.
  - id: plan
    purpose: Pre-registered design with power analysis and timeline
    emphasis:
      - specific_aims  # typically 3-5 aims for NSF, 1-3 for NIH
      - research_strategy  # methodology with power analysis
      - innovation_claims  # what's novel and why it matters
      - feasibility_assessment  # timeline, team, resources
      - budget_justification  # costs tied to method, not just numbers
  - id: critique
    purpose: Run proposal through funder rubric and assess feasibility
    emphasis:
      - feasibility_score  # can this team deliver in the timeline?
      - innovation_specificity  # are novelty claims concrete or vague?
      - significance_justification  # impact is tied to evidence and logic
      - reviewer_objections  # what will reviewers ask?
      - power_analysis_adequacy  # are sample sizes, effect sizes realistic?
  - id: draft
    purpose: Funding-agency-compliant proposal structure
    template: templates/grant-proposal-skeleton.latex
    sections:
      - specific-aims  # 1-page summary
      - research-strategy
      - methods-and-analysis
      - timeline-and-milestones
      - team-and-capacity
      - broader-impacts  # NSF requirement
      - literature-review-and-justification
  - id: publish
    purpose: Funder-specific output
    venue: configurable  # nsf-cise, nsf-sbir, nih-r01, darpa, eu-horizon
    output_formats: [pdf, docx]
    artifacts:
      - proposal.pdf
      - specific-aims-page.pdf
      - proposal.docx
      - preregistration.yaml
      - budget-justification.xlsx

# ---------------------------------------------------------------------------
# Defaults — overridable by user
# ---------------------------------------------------------------------------
defaults:
  honest_pivot: false  # not applicable (no data yet)
  exploratory_labeling: false  # not applicable
  preregistration_required: true
  citation_style: apa
  funder: configurable  # prompt for funder early

# ---------------------------------------------------------------------------
# Publish gates — enforced at /publish entry. Session refuses to run /publish
# until these conditions are satisfied.
# ---------------------------------------------------------------------------
publish_gates:
  # -- v0.3 workflow gates ---------------------------------------------------
  critique_required:
    enabled: true
    description: |
      /publish refuses to execute until at least one /critique pass has produced
      a critique_report artifact for the current draft. This prevents publishing
      work that has not been subjected to structured self-review.
    enforcement: block
    bypass: "--no-critique-gate"
    bypass_warning: |
      Publishing without a critique pass. The output's metadata will record
      that critique was bypassed. This is appropriate for informal drafts and
      internal-use documents, but not recommended for external publication.
    artifact_required: critique.yaml  # produced by /critique mode; lives in .amplifier/sessions/<session>/

  honest_pivot_acknowledged:
    enabled: false  # N/A — grant-proposal has no /execute phase
    description: |
      If /execute produced findings that diverge from the pre-registration,
      /publish requires the user has acknowledged each divergence via the
      honest-pivot behavior (either labeled exploratory, amended with
      timestamp, or disabled with --no-honest-pivot flag).
    enforcement: block
    bypass: null  # Cannot be bypassed — architectural guarantee

  # -- Domain-specific quality gates ----------------------------------------
  quality_gates:
    - name: feasibility_score
      condition: evaluated as "feasible" by methodologist (≥3.5/5)
      on_fail: warn
    - name: innovation_claim_specificity
      condition: each novelty claim is concrete and tied to prior work
      on_fail: block
    - name: power_analysis_included
      condition: sample size or effect-size justification present for primary aim
      on_fail: block
    - name: timeline_alignment
      condition: timeline is realistic for proposed team size and scope
      on_fail: warn
    - name: budget_justified
      condition: major budget line items tied to methods or personnel needs
      on_fail: warn

# ---------------------------------------------------------------------------
# Persona detection hints
# ---------------------------------------------------------------------------
persona_signals:
  persona_b_indicators:
    - user mentions a funder or funding program
    - user describes a research question and team
    - user asks about sample size, power, or timeline
  persona_a_indicators:
    - user is not a researcher but needs grant infrastructure for a project
