# =========================================================================
# EVIDENCE CLASS A — Discipline-gap evidence
# =========================================================================
class_A_discipline_gap:

  finding_A1:
    claim_supported: |
      Patent attorneys already practice an evidence-defensibility craft.
      The statutory scaffolding (§§ 102, 103, 112) asks the same
      questions scientific peer review asks: is this claim novel, is it
      non-obvious, is it actually enabled by the disclosure?
    evidence:
      - source: MPEP § 2100 series (USPTO)
        note: codifies duty-of-candor (37 CFR 1.56), disclosure
              obligations, and examination standards
      - source: MPEP § 2163 (written description + enablement under § 112(a))
        note: "full, clear, concise, and exact terms as to enable any
               person skilled in the art to which it pertains"
      - source: MPEP § 2141 (Graham v. Deere four-factor obviousness test)
        note: scope and content of prior art → differences → level of
              skill → secondary considerations
    strength: strong (primary USPTO sources)
    gloss_for_paper: |
      § 102 = "has anyone already done this?" — novelty.
      § 103 = "would the obvious next step for a skilled practitioner
              get here?" — non-obviousness.
      § 112 = "does the disclosure actually teach someone skilled how to
              build it?" — enablement + written description.

  finding_A2:
    claim_supported: |
      Commodity LLM use in drafting leaks discipline in predictable ways:
      post-hoc search-scope narrowing, unstated assumptions in the
      detailed description, and overclaiming adverbs in the specification.
    evidence:
      - source: IPWatchdog and Patently-O practitioner commentary on
                AI-assisted drafting (2024-2025)
        note: recurring themes: hallucinated references, silently
              narrowed claim sets, "substantially"-laden specifications
              that weaken enablement
      - source: USPTO AI-assistance guidance (2024, updated 2025)
        note: registration and disclosure obligations when AI tools are
              used in prosecution; duty-of-candor extends to AI-induced
              errors
      - source: internal dogfood observation (bundle session 2026-04-22)
        note: bundle /question on self surfaces that "significantly"
              and "dramatically" appear in draft outputs even when the
              spec provides no numbers — an overclaim pattern the bundle
              is designed to catch via /critique
    strength: moderate (practitioner commentary + single dogfood run)
    gloss_for_paper: |
      The problem is not that LLMs "hallucinate" — attorneys can catch
      that. The problem is that they quietly skip the disciplined steps
      that would have caught a weaker claim or a thinner enablement
      earlier. The skipping is INVISIBLE unless you design the workflow
      to make the steps visible.

  finding_A3:
    claim_supported: |
      Pre-registration discipline is a proven intervention in adjacent
      evidence-defensibility domains (clinical trials, empirical
      psychology). It works by making methodology decisions visible and
      auditable before results are known.
    evidence:
      - source: Nosek et al. 2018, PNAS, "The preregistration revolution"
        note: analogical support — NOT a patent-specific citation
      - source: ClinicalTrials.gov registration mandate (FDA AA Act 2007)
        note: demonstrates that regulatory pre-registration enforcement
              is feasible in high-stakes evidence domains
    strength: analogical only
    honest_limit: |
      Nothing in the literature establishes that pre-registration
      improves patent prosecution outcomes. The parallel is conceptual.
      The paper must present it as "the bundle applies a known rigor
      mechanism to an adjacent domain where the same failure modes
      appear" — not as "pre-registration has been shown to improve
      patent quality."

# =========================================================================
# EVIDENCE CLASS B — Competitive landscape (fair, non-straw-manned)
# =========================================================================
class_B_competitive:

  comparator_B1_ip_management_suites:
    names: [PatSnap, Anaqua, Clarivate IP Management]
    assessment_method: vendor documentation + G2/Capterra reviews as of
                        2026-04; no hands-on product testing performed
    product_category: IP portfolio and docket management
    strengths:
      - mature prior-art search across millions of records
      - portfolio analytics, deadline docketing, family management
      - enterprise procurement and audit readiness
    weaknesses_for_this_comparison:
      - not a drafting tool — no methodology enforcement for the
        first-draft step
      - no auditable pre-registration of search scope
      - priced for enterprise; out of reach for solo/small-firm Persona A
    honest_framing: |
      These are adjacent products, not rivals. The bundle's competitive
      claim is ONLY that it occupies a drafting-methodology niche these
      products do not address.

  comparator_B2_ai_drafting_tools:
    names: [Rowan Patents, Solve Intelligence, ClaimMaster, Patent Bots]
    assessment_method: public product pages, recorded vendor demos,
                        third-party reviews (as available as of 2026-04)
    product_category: AI-assisted patent drafting
    strengths:
      - filing-ready prose output
      - claim-chart automation
      - integrated drafting workflow inside a single UI
    weaknesses_for_this_comparison:
      - methodology layer is typically opaque — no visible
        pre-registration of search scope or claim-narrowing decisions
      - "filing-ready" framing risks deskilling attorneys on the very
        judgment steps examiners test later
      - attorney cannot reproduce the drafting decision audit without
        vendor cooperation
    honest_framing: |
      Output-quality gap to the bundle is narrow and NOT the
      distinguishing axis. The distinguishing axis is methodology
      visibility and audit trail.

  comparator_B3_raw_llm:
    names: [ChatGPT o1/o3, Claude Sonnet/Opus, Gemini 2.5 Pro]
    assessment_method: public capability documentation + dogfood LLM
                        session (2026-04-22)
    product_category: general-purpose LLM chat
    strengths:
      - zero setup, universally available
      - wide general capability; attorney bears no tooling cost
    weaknesses_for_this_comparison:
      - attorney carries ALL discipline manually
      - no prior-art audit trail
      - no built-in overclaiming detection
      - no venue-aware formatting
      - inconsistent across sessions (no persistent methodology)
    honest_framing: |
      This is the BASELINE, not a rival. The bundle exists specifically
      to make a raw-LLM workflow reproducible and auditable.

  comparator_B4_internal_checklists:
    names: [firm-internal templates, MPEP-derived checklists, AIPLA
            published templates]
    assessment_method: review of publicly published firm resources where
                        available; most firm-internal artifacts are
                        confidential
    product_category: tacit firm knowledge
    strengths:
      - battle-tested by decades of prosecution
      - tuned to firm's specific claim-drafting philosophy
      - free (already paid for)
    weaknesses_for_this_comparison:
      - invisible to audit (which parts of the checklist were actually
        applied on a given matter?)
      - scales poorly across attorneys and juniors
      - degrades with turnover
      - not portable when an attorney leaves
    honest_framing: |
      The bundle does NOT replace firm expertise. It gives a FORM for
      that expertise to travel in, and a structured way for a junior to
      inherit a senior's discipline without inheriting their tacit
      corrections.

  comparator_BUNDLE_self:
    name: amplifier-bundle-research v0.4.0
    strengths:
      - pre-registration of search scope before search executes
      - /critique pass surfaces enablement + overclaim findings with
        severity labels (BLOCK / WARN / NOTE)
      - honest-pivot enforcement prevents silent scope shifts
      - venue-formatter emits USPTO-compliant output (37 CFR 1.52
        margins, claim numbering, line spacing)
      - Open source, Apache-2.0, one-command install
    weaknesses_honestly:
      - NO real-attorney UX validation yet (v0.4 is simulated-persona
        only — see Limitations section)
      - NO measured time-cost comparisons against any baseline
      - trade-secret-sensitive matters require an on-prem deployment
        that does not yet exist for the default Anthropic-provider config
      - output-prose quality has received less optimization effort than
        competitor B2 class
      - attorney UX mode-transition friction has not been measured
    honest_framing: |
      The bundle wins on METHODOLOGY VISIBILITY. It does not
      necessarily win on output polish or on integrated docketing. A
      reader whose pain is "I want filing-ready prose in one click" is
      not the bundle's audience.

