# =========================================================================
completeness_check:
  white_paper_recipe_gate: quality_gates
  - gate: evidence_coverage (≥ 3 independent sources per major claim)
    status: WARN
    reason: |
      Thesis P1 (prior-art auditability) has MPEP § 2100, Nosek 2018,
      and internal dogfood run = 3 sources BUT one is analogical.
      Thesis P2 (enablement catch rate) has MPEP § 2163, practitioner
      commentary, and dogfood observation = 3 sources. Thesis P3
      (claim scope) has dogfood + analytical reasoning + claim-chart
      template structure = 2 direct + 1 analytical. Thesis P4 (time
      cost) has ONLY walkthrough evidence — no measured baselines.
      Per honest-pivot clause, P4 is labeled OPERATIONAL not EMPIRICAL.
  - gate: competitive_analysis (≥ 2 competitor classes analyzed)
    status: PASS
    reason: 4 competitor classes analyzed (IP management, AI drafting,
            raw LLM, internal checklists)
  - gate: thesis_clarity (≤ 2 sentences, falsifiable)
    status: PASS
    reason: one_line_thesis is one sentence with explicit
            disconfirmation criteria
  - gate: overclaim_detection
    status: DEFERRED to /critique
ready_for_critique: true
