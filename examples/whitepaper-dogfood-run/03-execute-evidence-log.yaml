# =========================================================================
# EVIDENCE CLASS D — Risks (mandatory for white-paper recipe)
# =========================================================================
class_D_risks:

  risk_D1_claim_scope_regression:
    description: |
      /critique might flag "aggressive-but-supported" claims as
      overclaims, causing an attorney to accept a narrower claim than
      they should have filed.
    likelihood: medium
    impact: high (direct patent-quality cost)
    mitigation: |
      /critique distinguishes "overclaim" (unsupported-by-spec) from
      "aggressive-but-supported" and issues BLOCK severity only for the
      former. An attorney retains full editorial control — /critique
      findings are advisory, not enforced at /draft unless explicitly
      configured. But the REAL mitigation is attorney-in-the-loop review
      at each mode boundary; this risk is NOT fully mitigated.
    residual: non-zero — must be acknowledged in the paper

  risk_D2_trade_secret_leakage:
    description: |
      Default bundle configuration uses a hosted LLM provider
      (Anthropic, OpenAI, etc.). Invention disclosures sent to a hosted
      provider may violate trade-secret protections, client
      confidentiality expectations, or export-control restrictions.
    likelihood: medium (depends on client consent posture)
    impact: high (legal exposure + malpractice risk)
    mitigation: |
      On-prem deployment modes exist in the broader Amplifier ecosystem
      (Ollama, local Azure OpenAI). The RESEARCH bundle has not been
      validated end-to-end under these modes. Attorneys handling
      pre-filing trade-secret matter should either wait for v1.x's
      on-prem validation or self-validate before use.
    residual: significant — acknowledged as explicit Out-Of-Scope for v0.4

  risk_D3_attorney_UX_unvalidated:
    description: |
      v0.4 passed simulated persona-A acceptance. It has NOT been
      tested by a real patent attorney on a real filing. Mode-transition
      friction, default-wording appropriateness, and vocabulary
      pitch-to-audience are all unvalidated in anger.
    likelihood: high (this gap is known, not hypothetical)
    impact: medium (delays v1.0; does not harm matters drafted by
             attorneys who review every step)
    mitigation: |
      post-v0.4 roadmap commits to 3 real-attorney sessions before v1.0.
      The paper itself is an artifact of this validation effort — it
      exists partly to surface the bundle to attorneys who might
      participate.
    residual: significant — this is the headline limitation

  risk_D4_false_positive_overclaim_flags:
    description: |
      honest-critic may flag language that is defensible in context
      (e.g., "reduces latency by 50%" when the spec includes the
      supporting benchmark). An attorney who accepts all BLOCK findings
      uncritically could weaken claim language.
    likelihood: medium
    impact: low-medium (catchable in final review)
    mitigation: |
      findings are SEVERITY-LABELED (BLOCK/WARN/NOTE); attorney
      retains accept/reject control; /critique shows the specific
      text it flagged for each finding so attorney can judge context.
      Paper surfaces this as a known UX failure mode.
    residual: minor — mitigable with reasonable review practice

