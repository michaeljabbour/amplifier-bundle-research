    notes: |
      L3 is rewritten with "you should not use..." putting the attorney
      reader in the seat (per stop-slop research-bundle-examples.md #2).
      L6 keeps the vendor-author conflict explicit. No false agency.
  about_the_author:
    verdict: PASS
    notes: |
      Third-person throughout (Michael Jabbour as subject). No
      narrator-from-a-distance. No vague declaratives. Conflict disclosure
      is explicit.

# =========================================================================
# New findings surfaced by stop-slop (beyond 04-critique.yaml)
# =========================================================================
new_findings:
  SS1:
    severity: NOTE
    finding: |
      Three-item lists appear throughout the problem-statement and
      proposed-approach sections ("search scope discipline, overclaiming
      detection, enablement self-check"). stop-slop rule 6 prefers "two
      items beat three." Keeping three-item lists where each item is
      load-bearing; flagging for future tightening.
    location: multiple, notably section 1.2
    resolved: accepted as NOTE; no change to draft
  SS2:
    severity: NOTE
    finding: |
      Document uses "significant" once (risk table, R1 residual column:
      "Significant. Unresolved for v0.4.0."). This is the allowed sense
      (named residual risk magnitude) rather than the banned sense
      (vague declarative). Logged for transparency.
    location: Risk table R1, R2
    resolved: accepted as NOTE; usage is calibrated to a named quantity
  SS3:
    severity: NOTE
    finding: |
      Sentence rhythm: three consecutive sentences in the executive
      summary share roughly similar length (65-80 characters each).
      stop-slop rule 6 says "break one." Not aggressively broken;
      flagged for future revision.
    location: executive summary, paragraph 2
    resolved: accepted as NOTE

