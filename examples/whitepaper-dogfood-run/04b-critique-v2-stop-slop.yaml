# /critique pass #2 — with stop-slop skill loaded
# =========================================================================
# Role: second /critique pass on the LaTeX draft (05-draft.tex), after
# loading the newly-ported stop-slop skill. This pass targets prose-level
# AI-tell patterns that the first /critique pass (04-critique.yaml) was
# not equipped to catch.
#
# Method: grep sweep against the stop-slop rule catalog plus manual read
# of load-bearing sections (executive summary, thesis, limitations,
# about-the-author).
# =========================================================================

metadata:
  created_at: 2026-04-23T08:12:00-04:00
  created_by: honest-critic + stop-slop skill (loaded inline)
  upstream_artifact: output/whitepaper-run/05-draft.tex
  skill_loaded: stop-slop (.amplifier/skills/stop-slop/SKILL.md)
  sweep_type: grep + targeted manual read of exec summary, thesis, limitations

# =========================================================================
# Grep sweep results
# =========================================================================
grep_sweep:
  adverbs:
    rule: ".amplifier/skills/stop-slop/references/phrases.md (adverbs section)"
    pattern: "\\b(really|just|literally|genuinely|honestly|simply|actually|deeply|truly|fundamentally|inherently|inevitably|interestingly|importantly|crucially)\\b"
    hits: 0
    status: PASS
  throat_clearing:
    pattern: "Here's (the thing|what|this|that|why|the problem)"
    hits: 0
    status: PASS
  em_dashes:
    pattern: "—"
    hits_initial: 3
    locations:
      - line 2: comment (non-rendering)  — OK
      - line 35: subtitle — FIXED (replaced with comma)
      - line 41: date metadata — FIXED (replaced with comma)
    hits_after_fix: 1 (line 2, comment only, does not render)
    status: PASS (zero rendering em-dashes)
  wh_starters:
    pattern: "(^|[.?!] )(What|When|Where|Which|Who|Why|How) "
    hits: 1
    locations:
      - line 70: "When attorneys use general-purpose AI..."
    decision: KEEP
    reason: |
      "When" here introduces a genuine conditional scope, not a rhetorical
      setup. stop-slop rule 6 targets Wh- openers as crutch; this usage
      is substantive ("under the condition that attorneys use AI, the
      problem manifests"). Logged rather than changed.
    status: NOTE
  binary_contrasts:
    pattern: "(isn't [A-Z].*it's|not because.*because|not just.*but also)"
    hits: 0
    status: PASS
  business_jargon:
    pattern: "\\b(navigate|unpack|lean into|landscape|game-changer|double down|deep dive|circle back)\\b"
    hits_initial: 1
    locations:
      - line 493: "landscape completeness" — FIXED (rewritten as "completeness")
    hits_after_fix: 0
    status: PASS
  vague_declaratives:
    pattern: "(implications are significant|stakes are high|reasons are structural|consequences are real)"
    hits: 0
    status: PASS
  false_agency:
    method: manual read of limitations and risks sections
    candidates_checked:
      - "trade-secret risks that make it inappropriate for confidential-invention matters"
        → decision: KEEP. "Risks making it inappropriate" is acceptable;
          the sentence already names the human (attorneys) in the same
          paragraph ("until an on-prem deployment mode exists that an
          attorney has validated").
      - "honest-critic may flag defensible language as overclaiming, leading
         an attorney under deadline pressure to accept narrower claims"
        → decision: KEEP. Active voice, attorney named as actor.
      - "pre-registration mechanism draws from an evidence base"
        → decision: KEEP. "Mechanism draws from" is borderline false-agency
          but conventional in academic prose; rewriting ("the author
          borrowed the pre-registration mechanism from...") would introduce
          an unnecessary first-person pronoun.
    status: PASS

# =========================================================================
# Manual read of load-bearing sections
# =========================================================================
