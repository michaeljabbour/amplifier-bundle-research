    verdict: PASS
    notes: |
      Opens with disclosure paragraph before any capability claim (per
      04-critique BLOCK B1). Thesis sentence is one clause, falsifiable.
      No adverb crutches. Action for reader is direct.
  thesis_sentence:
    text: |
      "amplifier-bundle-research v0.4.0 is a machine-assisted methodology
      scaffold that forces these steps to happen, on the record, before
      the first draft exists."
    verdict: PASS
    stop_slop_score:
      directness: 9 (clean declarative)
      rhythm: 8 (varied)
      trust: 9 (no hand-holding)
      authenticity: 9 (sounds like the author)
      density: 8 (could cut "machine-assisted" as redundant with
                  "scaffold that forces these steps to happen")
      total: 43/50 (well above 35/50 revise threshold)
  limitations_section:
